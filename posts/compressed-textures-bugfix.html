<h2 style='display: inline'><a href='./compressed-textures-bugfix.html'>Compressed texture support bugfix</a></h2>
<br/><p style='font-size: 0.8em; display: inline'> <b>2014-08-26</b></p>
<div class="summary">
<p>Some drivers misreport their support for compressed textures, which resulted in users unable to run the game. The offending check has been <a href="https://github.com/pioneerspacesim/pioneer/commit/6643f969ccd03ce9703ea62526d6820d7f8bc796">removed</a> and the <a href="http://sourceforge.net/projects/pioneerspacesim/">newest build</a> now seems to work on drivers that have this issue.</p>
